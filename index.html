<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SpendWise</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SpendWise">
    <meta name="theme-color" content="#F2F2F7">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10384/10384160.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #F2F2F7;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        #root { height: 100%; display: flex; flex-direction: column; }
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #F2F2F7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.4s ease-out;
        }
        .loading-screen.fade-out { opacity: 0; pointer-events: none; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-container {
            max-width: 80%;
            text-align: center;
            color: #ef4444;
            font-size: 12px;
            margin-top: 1rem;
            display: none;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error-container.show { display: block; }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">
        <div class="spinner"></div>
        <p id="loading-text" class="font-bold text-gray-400 uppercase tracking-[0.2em] text-[10px]">Initializing...</p>
        <div id="error-display" class="error-container"></div>
    </div>

    <div id="root"></div>
    
    <script>
        console.log("SpendWise: index.html failsafe script running");
        window.SpendWiseLoadingStarted = true;
        let seconds = 0;
        const interval = setInterval(() => {
            seconds++;
            console.log(`SpendWise: Waiting... (${seconds}s) - Started: ${!!window.SpendWiseLoadingStarted}, Initialized: ${!!window.SpendWiseInitialized}`);
            if (window.SpendWiseInitialized) {
                console.log("SpendWise: SUCCESS - Initialized detected!");
                clearInterval(interval);
            }
            if (seconds >= 30) {
                console.error("SpendWise: TIMEOUT - Initialization took too long.");
                clearInterval(interval);
            }
        }, 1000);

        // Check if the app initialized after 22 seconds
        setTimeout(() => {
            if (!window.SpendWiseInitialized) {
                console.error("SpendWise: App failed to initialize within 22s.");
                const errorDisplay = document.getElementById('error-display');
                if (errorDisplay) {
                    errorDisplay.innerHTML = "<strong>Initialization Timeout</strong><br>The application script failed to start. This could be due to a network error, a slow start, or a script crash.<br><br>Please try refreshing the page or checking your internet connection.";
                    errorDisplay.classList.add('show');
                }
                const loadingText = document.getElementById('loading-text');
                if (loadingText) loadingText.innerText = "Error";
            }
        }, 22000);
    </script>
    <script type="module" src="./src/index.tsx" onload="window.SpendWiseInitialized=true; console.log('SpendWise: index.tsx LOADED via onload');" onerror="console.error('SpendWise: index.tsx FAILED to load'); window.SpendWiseLoadFailed=true;"></script>
</body>
</html>
